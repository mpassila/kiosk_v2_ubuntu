    if (window.location.protocol === 'file:') {

  window.electron.sideeventNative.initSerialPort();

  // Initialize RFID service (WebSocket to RFID server)
  console.log('INDEX: Initializing RFID service...');
  window.electron.sideeventNative.initRfidService().then(function(result) {

      console.log('INDEX: RFID service connected, connecting to reader...');
      window.electron.sideeventNative.connectRfidReader().then(function(connectResult) {
        console.log('INDEX: RFID reader connect result:', connectResult);
      }).catch(function(err) {
        console.error('INDEX: RFID reader connect error:', err);
      });
    }
  }).catch(function(err) {
    console.error('INDEX: RFID service init error:', err);
  });
